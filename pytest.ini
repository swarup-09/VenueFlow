[pytest]
# ── Async mode ─────────────────────────────────────────────────────────────────
# pytest-asyncio "auto" mode means every async test/fixture runs automatically
# inside an event loop — no @pytest.mark.asyncio decoration needed.
asyncio_mode = auto

# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output & CLI defaults ─────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# ── Live logging — invaluable for debugging Kafka/WS latency issues ───────────
log_cli            = true
log_cli_level      = INFO
log_level          = DEBUG
log_format         = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format    = %H:%M:%S

# ── Custom markers ─────────────────────────────────────────────────────────────
markers =
    pipeline:    Sensor → Kafka → Consumer → Digital Twin end-to-end tests
    experience:  Fan and Ops Experience Layer tests (orders, WS, perf)
    smoke:       Fast smoke tests — no external service dependencies
